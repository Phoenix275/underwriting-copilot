name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Streamlit deployment deps must stay minimal and installable
        run: pip install -r requirements.txt
      - name: Run test suite (offline — no dataset downloads needed)
        run: pytest tests/ -q
