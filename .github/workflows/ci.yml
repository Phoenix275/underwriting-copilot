name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Streamlit deployment deps must stay minimal and installable
        run: pip install -r requirements.txt
      - name: Run test suite (offline — no dataset downloads needed)
        run: pytest tests/ -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # matches the local floor; Vite 6 supports 18/20/22
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Type-check
        run: npm run typecheck
        working-directory: web
      - name: Browser scoring engine must agree with the Python pipeline
        run: npm run verify
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Built dashboard must be a single self-contained file
        working-directory: web
        run: |
          test -f dist/index.html
          # a stray asset means something escaped the inliner and would 404
          # on GitHub Pages and inside the Streamlit iframe
          extra=$(find dist -type f ! -name index.html | wc -l)
          if [ "$extra" -ne 0 ]; then
            echo "expected only dist/index.html, found $extra other file(s):"
            find dist -type f ! -name index.html
            exit 1
          fi
          # nothing may be fetched from a third-party host at runtime
          if grep -qE '(src|href)="https?://' dist/index.html; then
            echo "build references an external origin:"
            grep -oE '(src|href)="https?://[^"]*"' dist/index.html | sort -u
            exit 1
          fi
      - name: Committed copies must match the build
        run: |
          diff -q web/dist/index.html dashboard/underwriting_copilot_mvp.html
          diff -q web/dist/index.html docs/index.html
